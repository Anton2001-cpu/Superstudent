<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperStudent — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 44px 40px 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.08);
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 6px;
    }
    .sub {
      font-size: 13px;
      color: #86868b;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #86868b;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      padding: 10px 13px;
      border: 1px solid #d2d2d7;
      border-radius: 10px;
      outline: none;
      background: #f5f5f7;
      color: #1d1d1f;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: #0071e3; background: #fff; }
    .error {
      font-size: 12px;
      color: #ff3b30;
      margin-top: 8px;
      min-height: 18px;
    }
    button {
      margin-top: 22px;
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #0077ed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">SuperStudent</div>
    <div class="sub">Enter the access password to continue.</div>
    <form method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus placeholder="••••••••" autocomplete="current-password">
      <div class="error">{{ error or "" }}</div>
      <button type="submit">Continue</button>
    </form>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperStudent | Start</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --primary-blue: #0084ff;
      --text-main: #ffffff;
      --text-dim: #a0a0a0;
      --border-color: #333;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .main-header {
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }

    .logo { font-weight: bold; font-size: 1.2rem; }
    .logo span { color: var(--primary-blue); }

    .header-tools { display: flex; gap: 15px; align-items: center; }
    .tool-btn {
      background: none; border: 1px solid var(--border-color);
      color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer;
      font-family: inherit; font-size: 13px;
    }

    .toggle-group {
      background: #222; border-radius: 20px; padding: 3px; display: flex;
    }
    .toggle-group button {
      background: none; border: none; color: var(--text-dim);
      padding: 5px 15px; border-radius: 17px; cursor: pointer;
      font-family: inherit; font-size: 13px;
    }
    .toggle-group button.active { background: #333; color: white; }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #34c759;
      box-shadow: 0 0 0 2px rgba(52,199,89,0.25);
      display: inline-block;
    }

    .hero-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero-content { max-width: 500px; width: 100%; }

    .ai-icon-visual {
      margin-bottom: 20px;
      display: flex; justify-content: center;
    }
    h1 { font-size: 2rem; margin-bottom: 15px; font-weight: 700; }
    .hero-sub { color: var(--text-dim); margin-bottom: 40px; line-height: 1.5; }

    .login-card {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 15px;
      text-align: left;
    }

    .login-card label {
      font-size: 0.75rem; color: var(--text-dim);
      font-weight: bold; letter-spacing: 0.06em;
    }

    input[type="password"] {
      width: 100%;
      background: #2a2a2a;
      border: 1px solid var(--border-color);
      padding: 12px;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
    }
    input[type="password"]:focus { border-color: var(--primary-blue); }

    .error {
      font-size: 12px; color: #ff453a;
      min-height: 16px; margin-top: -8px;
    }

    .btn-primary {
      background: var(--primary-blue);
      color: white; border: none;
      padding: 15px; border-radius: 8px;
      font-weight: bold; font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn-primary:hover { transform: translateY(-1px); opacity: 0.9; }

    .secondary-actions { margin-top: 20px; font-size: 0.85rem; color: var(--text-dim); }
    .secondary-actions a { color: var(--text-dim); text-decoration: none; }
    .secondary-actions a:hover { text-decoration: underline; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>

  <header class="main-header">
    <div class="logo">Super<span>Student</span></div>
    <div class="header-tools">
      <span class="status-dot"></span>
      <div class="toggle-group">
        <button class="active">Student</button>
        <button>Teacher</button>
      </div>
    </div>
  </header>

  <main class="hero-container">
    <div class="hero-content">
      <div class="ai-icon-visual">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#0084ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      </div>

      <h1>Activeer je cursusmateriaal met AI</h1>
      <p class="hero-sub">Stel vragen aan je eigen boeken en cursussen. Geen internet, geen gokwerk, alleen jouw leerstof.</p>

      <form class="login-card" method="POST">
        <label for="password">VOER TOEGANGSCODE IN</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" autofocus autocomplete="current-password">
        <div class="error">{{ error or "" }}</div>
        <button class="btn-primary" type="submit">Start met studeren</button>
      </form>

      <div class="secondary-actions">
        <span>Vraag je leerkracht om het wachtwoord</span>
      </div>
    </div>
  </main>

</body>
</html>

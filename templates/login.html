<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperStudent — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #e8e8eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .card {
      background: #f0f0f3;
      border-radius: 18px;
      padding: 44px 40px 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.08);
    }
    .logo { font-size: 22px; font-weight: 700; color: #1d1d1f; margin-bottom: 6px; }
    .logo em { font-style: normal; color: #4a6899; }
    .sub { font-size: 13px; color: #6e6e73; margin-bottom: 32px; }
    label {
      display: block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: #8a8a8a; margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%; font-family: inherit; font-size: 14px;
      padding: 10px 13px; border: 1px solid rgba(0,0,0,0.18);
      border-radius: 10px; outline: none;
      background: #e8e8eb; color: #1d1d1f; transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: #4a6899; background: #f0f0f3; }
    .error { font-size: 12px; color: #a03535; margin-top: 8px; min-height: 18px; }
    button {
      margin-top: 22px; width: 100%; font-family: inherit;
      font-size: 14px; font-weight: 600; padding: 11px;
      background: #4a6899; color: #fff; border: none;
      border-radius: 10px; cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: #3a5480; }

    /* Dark mode */
    body.dark { background: #1c1c1e; }
    body.dark .card { background: #2c2c2e; box-shadow: 0 2px 24px rgba(0,0,0,0.3); }
    body.dark .logo { color: #f5f5f7; }
    body.dark .sub { color: #aeaeb2; }
    body.dark label { color: #6e6e73; }
    body.dark input[type="password"] {
      background: #1c1c1e; color: #f5f5f7;
      border-color: rgba(255,255,255,0.18);
    }
    body.dark input[type="password"]:focus { border-color: #0a84ff; background: #2c2c2e; }
    body.dark button { background: #0a84ff; }
    body.dark button:hover { background: #1a8eff; }
    body.dark .error { color: #ff453a; }
  </style>
  <script>
    // Apply saved theme before paint to avoid flash
    if ((localStorage.getItem('theme') || 'dark') === 'dark') {
      document.documentElement.style.background = '#1c1c1e';
    }
  </script>
</head>
<body>
  <script>
    if ((localStorage.getItem('theme') || 'dark') === 'dark') document.body.classList.add('dark');
  </script>
  <div class="card">
    <div class="logo">Super<em>Student</em></div>
    <div class="sub">Enter the access password to continue.</div>
    <form method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus placeholder="••••••••" autocomplete="current-password">
      <div class="error">{{ error or "" }}</div>
      <button type="submit">Continue</button>
    </form>
  </div>
</body>
</html>

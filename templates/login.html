<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperStudent | Start</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-light: #f2f2f7;
      --card-bg: rgba(255,255,255,0.72);
      --primary: #1e3a8a;
      --primary-end: #fb923c;
      --text-main: #1c1c1e;
      --text-dim: #6e6e73;
      --border-color: rgba(0,0,0,0.09);
      --accent-grad: linear-gradient(130deg, #1e3a8a 82%, #fb923c 100%);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-light);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }


    .main-header {
      position: relative;
      z-index: 1;
      padding: 18px 30px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }

    .logo {
      position: absolute;
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      pointer-events: none;
    }
    .logo span { color: var(--primary); }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #34c759;
      box-shadow: 0 0 0 2px rgba(52,199,89,0.25);
      display: inline-block;
    }

    .toggle-group {
      background: rgba(0,0,0,0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0,0,0,0.09);
      border-radius: 20px;
      padding: 3px;
      display: flex;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .toggle-group button {
      background: none; border: none;
      color: rgba(0,0,0,0.4);
      padding: 5px 16px; border-radius: 16px;
      cursor: pointer; font-family: inherit; font-size: 12px;
      font-weight: 500;
      transition: background 0.22s ease, color 0.22s ease, box-shadow 0.22s ease;
    }
    .toggle-group button.active {
      background: rgba(255,255,255,0.85);
      color: #1c1c1e;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    }

    .hero-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .hero-content {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
      line-height: 1.25;
    }

    .hero-sub {
      color: var(--text-dim);
      font-size: 0.85rem;
      line-height: 1.55;
      margin-bottom: 28px;
    }

    .login-card {
      background: none;
      border: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    }

    .login-card label {
      font-size: 0.7rem;
      color: var(--text-dim);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      padding: 13px 16px;
      border-radius: 12px;
      color: #1c1c1e;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    input[type="password"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(122,162,204,0.2);
    }

    .error {
      font-size: 12px;
      color: #ff453a;
      min-height: 16px;
      margin-top: -6px;
    }

    .btn-primary {
      background: #1e3a8a;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover {
      background: #4a8de8;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(91,156,246,0.45);
    }

    @media (max-width: 500px) {
      .main-header { padding: 14px 16px; }
      .logo { left: 16px; font-size: 1rem; }
      .hero-container { padding: 24px 16px; }
      .hero-content { max-width: 100%; }
      h1 { font-size: 1.15rem; }
      .login-card { padding: 16px; }
    }

    .footer-note {
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--text-dim);
    }

  </style>
</head>
<body>

  <header class="main-header">
    <div class="logo">Super<span>Student</span></div>
    <div class="header-right">
      <span class="status-dot"></span>
      <div class="toggle-group">
        <button id="btn-student" class="active" onclick="setMode('student')">Student</button>
        <button id="btn-teacher" onclick="setMode('teacher')">Teacher</button>
      </div>
    </div>
  </header>

  <main class="hero-container">
    <div class="hero-content">

      <h1 id="hero-title">Activeer je cursusmateriaal met AI</h1>

      <form class="login-card" method="POST">
        <input type="hidden" name="mode" id="mode-input" value="student">
        <label for="password" id="pw-label">VOER TOEGANGSCODE IN</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" autofocus autocomplete="current-password">
        <div class="error">{{ error or "" }}</div>
        <button class="btn-primary" type="submit">Login</button>
      </form>

      <div class="footer-note" id="footer-note">Vraag je leerkracht om het wachtwoord</div>

    </div>
  </main>

  <script>
    function setMode(mode) {
      document.getElementById('btn-student').classList.toggle('active', mode === 'student');
      document.getElementById('btn-teacher').classList.toggle('active', mode === 'teacher');
      document.getElementById('mode-input').value = mode;
      document.getElementById('pw-label').textContent =
        mode === 'teacher' ? 'LERAARWACHTWOORD' : 'VOER TOEGANGSCODE IN';
      document.getElementById('footer-note').textContent =
        mode === 'teacher' ? 'Voer het leraarspasswoord in om toegang te krijgen' : 'Vraag je leerkracht om het wachtwoord';
    }
  </script>

</body>
</html>
